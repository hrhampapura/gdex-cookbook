# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  title: GDEX Cookbook
  github: https://github.com/projectpythia/gdex-cookbook
  authors:
    - name: Harsha R. Hampapura
      orcid: 0000-0002-2449-9032
      github: hrhampapura
      affiliations:
        - ncar
    - name: Riley P. Conroy
      orcid: 0009-0002-6453-2412
      github: rpconroy
      affiliations:
        - ncar
    - name: Chia-Wei Hsu
      orcid: 0000-0002-4838-0140
      github: chiaweh2
      affiliations:
        - ncar
    - name: Mya Sears
      orcid: 0009-0003-5870-7498
      github: myasea8
      affiliations:
        - ncar
    - name: GDEX Cookbook contributors
      url: https://github.com/ProjectPythia/gdex-cookbook/graphs/contributors
  affiliations:
    - id: ncar
      name: NSF NCAR
      
  copyright: '2026'
  toc:
    - file: README.md
    - title: Preamble
      children:
        - file: notebooks/how-to-cite.md
    - title: GDEX Introduction
      children:
        - file: notebooks/gdex_intro/gdex_intro.ipynb
        - file: notebooks/gdex_intro/services.ipynb
        - file: notebooks/gdex_intro/enabling_science.ipynb
        - file: notebooks/gdex_intro/submission.ipynb
    - title: Services
      children:
        - file: notebooks/services/services_intro.md
        - title: TDS
          children:
            - file: notebooks/services/tds_intro.ipynb
            - file: notebooks/services/tds_xarray.ipynb
            - file: notebooks/services/tds_siphon.ipynb
        - title: Zarr/Kerchunk
          children:
            - file: notebooks/services/zarr_intro.ipynb
            - file: notebooks/services/zarr_workflow.ipynb
        - title: API
          children:
            - file: notebooks/services/api_intro.ipynb
            - file: notebooks/services/api_subset.ipynb
            - file: notebooks/services/api_metadata.ipynb
        - title: Direct Download
          children:
            - file: notebooks/services/download_intro.ipynb
            - file: notebooks/services/download_workflow.ipynb
        - file: notebooks/services/posix_intro.ipynb
        - file: notebooks/services/globus_intro.ipynb
    - title: Workflows
      children:
        - title: Reanalysis
          children:
            - file: notebooks/workflows/era5.ipynb
            - file: notebooks/workflows/jra3q.ipynb
        - title: Model Simulations
          children:
            - file: notebooks/workflows/cesm2_lens.ipynb
            - file: notebooks/workflows/na-cordex.ipynb
            - file: notebooks/workflows/conus404.ipynb
        - title: Observations
          children:
            - file: notebooks/workflows/hadisst.ipynb
            - file: notebooks/workflows/radar.ipynb
        - file: notebooks/workflows/data_fusion.ipynb
  jupyter:
      binder:
        url: https://binder.projectpythia.org
        repo: projectpythia/gdex-cookbook
